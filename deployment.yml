apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-hens-deployment
  labels:
    app: healthy-hens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthy-hens
  template:
    metadata:
      labels:
        app: healthy-hens
    spec:
      containers:
      - name: healthy-hens-container
        image: ankitanallamilli/healthy-hens-java:IMAGE_TAG
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: healthy-hens-service
  labels:
    app: healthy-hens
spec:
  type: NodePort
  selector:
    app: healthy-hens
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30007
